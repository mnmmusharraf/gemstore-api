# ============================================================================
# APPLICATION
# ============================================================================
spring.application.name=backend
spring.profiles.active=dev
spring.config.import=optional:classpath:secrets.properties

# ============================================================================
# LIQUIBASE
# ============================================================================
spring.liquibase.enabled=true
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.xml

# ============================================================================
# FILE UPLOAD
# ============================================================================
app.upload.dir=uploads
app.base-url=http://localhost:8080
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# ============================================================================
# GEM PRICE API (FastAPI)
# ============================================================================
gem-price-api.base-url=http://localhost:8000
gem-price-api.predict-endpoint=/predict
gem-price-api.health-endpoint=/health
gem-price-api.timeout=30000
gem-price-api.enabled=true

# ============================================================================
# KAFKA CONFIGURATION
# ============================================================================
spring.kafka.bootstrap-servers=localhost:9092

# Kafka Consumer
spring.kafka.consumer.group-id=gemstore-messaging
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.enable-auto-commit=false
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=com.gemstore.backend.dtos.message
spring.kafka.consumer.properties.spring.json.value.default.type=com.gemstore.backend.dtos.message.MessageEventDto
spring.kafka.consumer.properties.spring.json.use.type.headers=false

# Kafka Producer
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.acks=all
spring.kafka.producer.retries=3
spring.kafka.producer.properties.enable.idempotence=true

# ============================================================================
# MESSAGING CONFIGURATION (Custom)
# ============================================================================
messaging.kafka.topics.messages=gemstore.messages
messaging.kafka.topics.message-status=gemstore.message-status
messaging.kafka.topics.typing=gemstore.typing
messaging.kafka.partitions=3
messaging.kafka.replicas=1