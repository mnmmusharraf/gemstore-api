spring.application.name=backend
spring.profiles.active=dev
spring.config.import=optional:classpath:secrets.properties

spring.liquibase.enabled=true
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.xml

app.upload.dir=uploads
app.base-url=http://localhost:8080

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# Gem Price API Configuration
gem-price-api.base-url=http://localhost:8000
gem-price-api.predict-endpoint=/predict
gem-price-api.health-endpoint=/health
gem-price-api.timeout=30000
gem-price-api.enabled=true