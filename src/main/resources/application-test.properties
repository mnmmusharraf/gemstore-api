# H2 in-memory DB
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Disable Liquibase for tests
spring.liquibase.enabled=false

# JWT test secret
security.jwt.secret=dGVzdC1zZWNyZXQta2V5LWZvci1nZW1zdG9yZS1hcHBsaWNhdGlvbi10ZXN0aW5n
security.jwt.ttl-seconds=3600

# Disable Kafka for tests
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration

# File storage (provide both keys in case code expects one or the other)
app.upload.dir=./test-uploads
file.upload-dir=./test-uploads

# ============================================
# DUMMY OAuth2 registration (required by SecurityConfig's .oauth2Login())
# These are fake values; no real OAuth2 calls will be made in tests.
# ============================================
spring.security.oauth2.client.registration.google.client-id=test-google-client-id
spring.security.oauth2.client.registration.google.client-secret=test-google-client-secret
spring.security.oauth2.client.registration.google.scope=email,profile
spring.security.oauth2.client.registration.google.redirect-uri=http://localhost:8080/login/oauth2/code/google
spring.security.oauth2.client.registration.google.client-name=Google


spring.mail.host=localhost
spring.mail.port=2525
spring.mail.username=test
spring.mail.password=test
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false